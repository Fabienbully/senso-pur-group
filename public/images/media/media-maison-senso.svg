<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="La Maison Senso — atelier de Vaulx-Milieu">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEECE9"/>
      <stop offset="100%" stop-color="#E3D8C7"/>
    </linearGradient>
    <linearGradient id="ms-shed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E3D23"/>
      <stop offset="100%" stop-color="#9D7960"/>
    </linearGradient>
    <pattern id="ms-stack" x="0" y="0" width="40" height="14" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="40" height="12" fill="#FFFFFF" opacity="0.92"/>
      <line x1="0" y1="13" x2="40" y2="13" stroke="#9D7960" stroke-width="0.8" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#ms-bg)"/>

  <!-- Sawtooth roof (atelier industriel) -->
  <g fill="url(#ms-shed)">
    <polygon points="0,420 130,260 260,420"/>
    <polygon points="260,420 390,260 520,420"/>
    <polygon points="520,420 650,260 780,420"/>
    <polygon points="780,420 910,260 1040,420"/>
    <polygon points="1040,420 1170,260 1200,260 1200,420"/>
  </g>

  <!-- Sky strips on the slope -->
  <g fill="#99B3B7" opacity="0.55">
    <polygon points="135,290 135,350 175,310 175,265"/>
    <polygon points="395,290 395,350 435,310 435,265"/>
    <polygon points="655,290 655,350 695,310 695,265"/>
    <polygon points="915,290 915,350 955,310 955,265"/>
  </g>

  <!-- Atelier base wall -->
  <rect x="0" y="420" width="1200" height="120" fill="#304E4D" opacity="0.92"/>
  <!-- Door + windows -->
  <rect x="80"  y="450" width="42" height="90" fill="#1B2824"/>
  <rect x="180" y="460" width="40" height="40" fill="#EEECE9" opacity="0.18"/>
  <rect x="245" y="460" width="40" height="40" fill="#EEECE9" opacity="0.18"/>
  <rect x="900" y="450" width="56" height="90" fill="#1B2824"/>
  <rect x="980" y="460" width="40" height="40" fill="#EEECE9" opacity="0.18"/>
  <rect x="1045" y="460" width="40" height="40" fill="#EEECE9" opacity="0.18"/>

  <!-- Foreground floor -->
  <rect x="0" y="540" width="1200" height="360" fill="#EEECE9"/>

  <!-- Mattress stacks (abstract, foreground) -->
  <g>
    <rect x="120" y="610" width="240" height="220" fill="url(#ms-stack)" stroke="#C4AE97" stroke-width="1"/>
    <rect x="430" y="650" width="200" height="180" fill="url(#ms-stack)" stroke="#C4AE97" stroke-width="1"/>
    <rect x="700" y="620" width="220" height="210" fill="url(#ms-stack)" stroke="#C4AE97" stroke-width="1"/>
    <rect x="980" y="660" width="180" height="170" fill="url(#ms-stack)" stroke="#C4AE97" stroke-width="1"/>
  </g>

  <!-- Pallets under stacks -->
  <g fill="#9D7960" opacity="0.85">
    <rect x="115" y="828" width="250" height="14"/>
    <rect x="425" y="828" width="210" height="14"/>
    <rect x="695" y="828" width="230" height="14"/>
    <rect x="975" y="828" width="190" height="14"/>
  </g>
  <g stroke="#6E3D23" stroke-width="1" opacity="0.55">
    <line x1="135" y1="842" x2="135" y2="855"/>
    <line x1="350" y1="842" x2="350" y2="855"/>
    <line x1="445" y1="842" x2="445" y2="855"/>
    <line x1="615" y1="842" x2="615" y2="855"/>
    <line x1="715" y1="842" x2="715" y2="855"/>
    <line x1="900" y1="842" x2="900" y2="855"/>
    <line x1="995" y1="842" x2="995" y2="855"/>
    <line x1="1145" y1="842" x2="1145" y2="855"/>
  </g>

  <!-- Subtle wordmark -->
  <text x="600" y="195" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-weight="500" font-size="38" letter-spacing="3" fill="#6E3D23" opacity="0.92">La Maison Senso</text>
  <text x="600" y="225" text-anchor="middle" font-family="'Manrope', sans-serif" font-weight="600" font-size="11" letter-spacing="6" fill="#6E3D23" opacity="0.6">VAULX-MILIEU · ISÈRE</text>
</svg>
