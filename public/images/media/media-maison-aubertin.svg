<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Maison Aubertin — art de vivre">
  <defs>
    <linearGradient id="ma-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3D8C7"/>
      <stop offset="100%" stop-color="#EEECE9"/>
    </linearGradient>
    <radialGradient id="ma-spot" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EEECE9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#ma-bg)"/>
  <rect width="1200" height="900" fill="url(#ma-spot)"/>

  <!-- Wall paneling (subtle) -->
  <g stroke="#C4AE97" stroke-width="0.6" opacity="0.45">
    <line x1="0"   y1="0" x2="0"   y2="650"/>
    <line x1="300" y1="0" x2="300" y2="650"/>
    <line x1="600" y1="0" x2="600" y2="650"/>
    <line x1="900" y1="0" x2="900" y2="650"/>
    <line x1="1200" y1="0" x2="1200" y2="650"/>
  </g>

  <!-- Floor line -->
  <line x1="0" y1="650" x2="1200" y2="650" stroke="#9D7960" stroke-width="1.4" opacity="0.55"/>

  <!-- Floor lamp (left) -->
  <g stroke="#6E3D23" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="200" y1="650" x2="200" y2="380"/>
    <path d="M 130 380 Q 130 320 200 320 Q 270 320 270 380 Z" fill="#9D7960" stroke="#6E3D23" stroke-width="1.6"/>
    <line x1="160" y1="660" x2="240" y2="660" stroke-width="3"/>
  </g>
  <ellipse cx="200" cy="395" rx="55" ry="6" fill="#6E3D23" opacity="0.25"/>

  <!-- Armchair (center) -->
  <g>
    <rect x="430" y="420" width="340" height="240" rx="20" fill="#99B3B7"/>
    <rect x="430" y="420" width="340" height="80" rx="20" fill="#6E3D23" opacity="0.10"/>
    <rect x="450" y="500" width="60" height="90" rx="8" fill="#99B3B7" stroke="#6E3D23" stroke-width="0.6" opacity="0.85"/>
    <rect x="690" y="500" width="60" height="90" rx="8" fill="#99B3B7" stroke="#6E3D23" stroke-width="0.6" opacity="0.85"/>
    <rect x="510" y="510" width="180" height="100" rx="8" fill="#EEECE9" stroke="#9D7960" stroke-width="0.8"/>
    <rect x="510" y="510" width="180" height="100" rx="8" fill="#9D7960" opacity="0.10"/>
    <line x1="450" y1="660" x2="450" y2="700" stroke="#6E3D23" stroke-width="3" stroke-linecap="round"/>
    <line x1="750" y1="660" x2="750" y2="700" stroke="#6E3D23" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Side table (right) -->
  <g>
    <rect x="900" y="540" width="180" height="20" fill="#6E3D23"/>
    <rect x="918" y="560" width="6" height="100" fill="#6E3D23"/>
    <rect x="1056" y="560" width="6" height="100" fill="#6E3D23"/>
    <line x1="900" y1="660" x2="1080" y2="660" stroke="#6E3D23" stroke-width="3" stroke-linecap="round"/>
    <!-- Vase + branch -->
    <path d="M 970 540 L 970 480 Q 960 460 980 450 Q 1000 460 990 480 L 990 540 Z" fill="#304E4D"/>
    <g stroke="#9D7960" stroke-width="1.4" fill="none" stroke-linecap="round">
      <path d="M 980 450 Q 990 410 1010 400"/>
      <path d="M 980 450 Q 970 400 950 380"/>
      <path d="M 980 450 Q 985 420 1000 420"/>
    </g>
    <g fill="#99B3B7" opacity="0.85">
      <ellipse cx="1010" cy="398" rx="6" ry="3"/>
      <ellipse cx="950"  cy="378" rx="6" ry="3"/>
    </g>
  </g>

  <!-- Wall art frame (above armchair) -->
  <g>
    <rect x="500" y="120" width="200" height="240" fill="#EEECE9" stroke="#6E3D23" stroke-width="3"/>
    <!-- Inner abstract -->
    <path d="M 540 320 Q 540 200 600 200 Q 660 200 660 320" fill="none" stroke="#6E3D23" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 565 320 Q 565 235 600 235 Q 635 235 635 320" fill="none" stroke="#9D7960" stroke-width="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="785" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-weight="500" font-size="42" letter-spacing="3" fill="#6E3D23">Maison Aubertin</text>
  <text x="600" y="820" text-anchor="middle" font-family="'Manrope', sans-serif" font-weight="600" font-size="11" letter-spacing="6" fill="#6E3D23" opacity="0.6">L'ART DE VIVRE</text>
</svg>
